name: SDK / Android release

on:
  push:
    tags:
      - 'sdk-android-v*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build, test & publish to internal Maven
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: sdk/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Derive version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#sdk-android-v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "sdk-android-release: tag '$tag' does not match sdk-android-vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
          } >>"$GITHUB_OUTPUT"

      - name: Verify changelog entry
        run: |
          version='${{ steps.version.outputs.version }}'
          if ! awk -v ver="$version" '$0 ~ "^## "ver"( |$|—)" { found=1 } END { exit !found }' CHANGELOG.md; then
            echo "sdk-android-release: no CHANGELOG.md entry for $version" >&2
            exit 1
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build & test
        run: gradle :build :test -Psdk.android.version='${{ steps.version.outputs.version }}'

      - name: Publish to internal Maven (GitHub Packages by default)
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gradle :publishLibraryPublicationToGitHubPackagesRepository \
            -Psdk.android.version='${{ steps.version.outputs.version }}'
