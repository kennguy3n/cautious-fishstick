name: SDK / Desktop release

on:
  push:
    tags:
      - 'sdk-desktop-v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    name: Build, test & publish to internal npm
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: sdk/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#sdk-desktop-v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "sdk-desktop-release: tag '$tag' does not match sdk-desktop-vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          pkg_version=$(node -p "require('./package.json').version")
          if [[ "$pkg_version" != "$version" ]]; then
            echo "sdk-desktop-release: package.json version ($pkg_version) does not match tag version ($version)" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
          } >>"$GITHUB_OUTPUT"

      - name: Verify changelog entry
        run: |
          version='${{ steps.version.outputs.version }}'
          if ! awk -v ver="$version" '$0 ~ "^## "ver"( |$|—)" { found=1 } END { exit !found }' CHANGELOG.md; then
            echo "sdk-desktop-release: no CHANGELOG.md entry for $version" >&2
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@shieldnet360'

      - name: Install
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run test

      - name: Publish to internal npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --provenance
