name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/access-ai-agent/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/access-ai-agent/**'
      - '.github/workflows/python-ci.yml'

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (access-ai-agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cmd/access-ai-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cmd/access-ai-agent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v
