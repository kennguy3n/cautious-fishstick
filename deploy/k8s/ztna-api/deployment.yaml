# Deployment for ztna-api — the public HTTP surface of the
# ShieldNet Access platform. Sizing follows the SN360 deployment
# pattern in docs/overview.md §10.2: cpu=200m mem=1Gi,
# GOMEMLIMIT=900MiB GOGC=100. Readiness + liveness both probe
# /health (always available per cmd/ztna-api/main.go:9).
#
# Per docs/overview.md §10.3, ztna-api is the only cluster member
# that gets a public ingress; access-workflow-engine and
# access-ai-agent stay cluster-internal and authenticate via the
# shared X-API-Key header that ACCESS_AI_AGENT_API_KEY pins.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ztna-api
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: ztna-api
    app.kubernetes.io/part-of: shieldnet-access
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ztna-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ztna-api
        app.kubernetes.io/part-of: shieldnet-access
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: ztna-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ztna-api
          image: ghcr.io/kennguy3n/cautious-fishstick/ztna-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ZTNA_API_LISTEN_ADDR
              value: ":8080"
            - name: GOMEMLIMIT
              value: "900MiB"
            - name: GOGC
              value: "100"
            - name: ACCESS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ztna-api-secrets
                  key: database-url
            - name: ACCESS_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ztna-api-secrets
                  key: redis-url
            - name: ACCESS_AI_AGENT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ztna-api-config
                  key: ai-agent-base-url
            - name: ACCESS_AI_AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ztna-api-secrets
                  key: ai-agent-api-key
            - name: ACCESS_WORKFLOW_ENGINE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ztna-api-config
                  key: workflow-engine-base-url
            - name: ACCESS_KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: ztna-api-config
                  key: kafka-brokers
                  optional: true
            - name: ACCESS_AUDIT_LOG_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: ztna-api-config
                  key: audit-log-topic
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
