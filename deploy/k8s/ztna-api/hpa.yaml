# HorizontalPodAutoscaler for ztna-api. Scales between 2 and 10
# replicas based on CPU utilization (target 70%). The lower bound of
# 2 keeps the public API available across a rolling restart; the
# upper bound limits blast-radius from a runaway client.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ztna-api
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: ztna-api
    app.kubernetes.io/part-of: shieldnet-access
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ztna-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
