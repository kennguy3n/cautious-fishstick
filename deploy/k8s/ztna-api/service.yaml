# Cluster-internal Service for ztna-api. A public ingress (Nginx /
# ALB / etc.) is configured separately by the platform team per
# docs/PROPOSAL.md §10.3.
apiVersion: v1
kind: Service
metadata:
  name: ztna-api
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: ztna-api
    app.kubernetes.io/part-of: shieldnet-access
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ztna-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ztna-api
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: ztna-api
    app.kubernetes.io/part-of: shieldnet-access
