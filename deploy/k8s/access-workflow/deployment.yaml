# Deployment for access-workflow-engine — the HTTP webhook engine
# that drives multi-step approval workflows. Cluster-internal only
# per docs/architecture.md §12; ztna-api reaches it via
# ACCESS_WORKFLOW_ENGINE_BASE_URL on the in-cluster service DNS.
#
# Sizing is conservative: workflows are I/O-bound (DB + webhook
# fan-out) so we mirror ztna-api's 1Gi memory ceiling but keep
# replicas at 2 for HA without over-allocating.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-workflow
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: access-workflow
    app.kubernetes.io/part-of: shieldnet-access
    app.kubernetes.io/component: workflow-engine
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: access-workflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: access-workflow
        app.kubernetes.io/part-of: shieldnet-access
        app.kubernetes.io/component: workflow-engine
    spec:
      serviceAccountName: access-workflow
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: access-workflow
          image: ghcr.io/kennguy3n/cautious-fishstick/access-workflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: ACCESS_WORKFLOW_ENGINE_LISTEN_ADDR
              value: ":8082"
            - name: GOMEMLIMIT
              value: "900MiB"
            - name: GOGC
              value: "100"
            - name: ACCESS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: access-workflow-secrets
                  key: database-url
            - name: ACCESS_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: access-workflow-secrets
                  key: redis-url
            - name: NOTIFICATION_SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: access-workflow-config
                  key: smtp-host
                  optional: true
            - name: NOTIFICATION_SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: access-workflow-config
                  key: smtp-port
                  optional: true
            - name: NOTIFICATION_SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: access-workflow-config
                  key: smtp-from
                  optional: true
            - name: NOTIFICATION_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: access-workflow-secrets
                  key: smtp-username
                  optional: true
            - name: NOTIFICATION_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: access-workflow-secrets
                  key: smtp-password
                  optional: true
            - name: NOTIFICATION_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: access-workflow-secrets
                  key: slack-webhook-url
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
