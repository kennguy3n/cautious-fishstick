# Deployment for pam-gateway — the privileged-session protocol
# proxy. Sizing follows docs/pam/architecture.md §9: cpu=500m
# mem=512Mi. Readiness + liveness both probe /health on the
# PAM_GATEWAY_HEALTH_PORT listener (cmd/pam-gateway/main.go).
#
# Unlike ztna-api, pam-gateway holds open long-lived TCP / WebSocket
# sessions per operator. The rolling-update strategy is the default
# (one new pod at a time) so in-flight sessions drain on their own
# 30s shutdown deadline before the old replica goes away.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pam-gateway
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: pam-gateway
    app.kubernetes.io/part-of: shieldnet-access
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: pam-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pam-gateway
        app.kubernetes.io/part-of: shieldnet-access
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: pam-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pam-gateway
          image: ghcr.io/kennguy3n/cautious-fishstick/pam-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
            - name: pg
              containerPort: 5432
              protocol: TCP
            - name: mysql
              containerPort: 3306
              protocol: TCP
            - name: k8s
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: PAM_GATEWAY_SSH_PORT
              value: "2222"
            - name: PAM_GATEWAY_HEALTH_PORT
              value: "8081"
            - name: PAM_GATEWAY_PG_PORT
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: pg-port
                  optional: true
            - name: PAM_GATEWAY_MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: mysql-port
                  optional: true
            - name: PAM_GATEWAY_K8S_PORT
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: k8s-port
                  optional: true
            - name: PAM_GATEWAY_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: api-url
            - name: PAM_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pam-gateway-secrets
                  key: api-key
            - name: PAM_GATEWAY_REPLAY_DIR
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: replay-dir
                  optional: true
            - name: PAM_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: s3-bucket
                  optional: true
            - name: PAM_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: pam-gateway-config
                  key: s3-region
                  optional: true
            - name: PAM_GATEWAY_SSH_HOST_KEY
              valueFrom:
                secretKeyRef:
                  name: pam-gateway-secrets
                  key: ssh-host-key
                  optional: true
            - name: PAM_GATEWAY_SSH_CA_KEY
              valueFrom:
                secretKeyRef:
                  name: pam-gateway-secrets
                  key: ssh-ca-key
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Recordings are written under PAM_GATEWAY_REPLAY_DIR by
            # the filesystem replay store. emptyDir is fine in-cluster:
            # the recorder flushes session blobs to S3 (see
            # PAM_S3_BUCKET / PAM_S3_REGION above) before the pod
            # restarts, so the local dir only buffers in-flight bytes.
            - name: replays
              mountPath: /var/lib/pam-gateway/replays
      volumes:
        - name: replays
          emptyDir:
            sizeLimit: 256Mi
      # 30s drains the in-flight SSH / SQL / K8s sessions per
      # cmd/pam-gateway/main.go:pamGatewayShutdownTimeout. Anything
      # longer just delays the rollout without buying drain time.
      terminationGracePeriodSeconds: 35
