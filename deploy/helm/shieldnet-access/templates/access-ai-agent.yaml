{{- if .Values.accessAiAgent.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: access-ai-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
    app.kubernetes.io/name: access-ai-agent
    app.kubernetes.io/component: ai-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: access-ai-agent-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
    app.kubernetes.io/name: access-ai-agent
data:
  listen-addr: "0.0.0.0:8090"
---
apiVersion: v1
kind: Secret
metadata:
  name: access-ai-agent-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
    app.kubernetes.io/name: access-ai-agent
type: Opaque
stringData:
  api-key: {{ .Values.accessAiAgent.secrets.apiKey | quote }}
  openai-api-key: {{ .Values.accessAiAgent.secrets.openaiApiKey | quote }}
  anthropic-api-key: {{ .Values.accessAiAgent.secrets.anthropicApiKey | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: access-ai-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
    app.kubernetes.io/name: access-ai-agent
    app.kubernetes.io/component: ai-agent
spec:
  type: {{ .Values.accessAiAgent.service.type }}
  selector:
    {{- include "shieldnet-access.selectorLabels" (dict "name" "access-ai-agent" "ctx" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.accessAiAgent.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-ai-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
    app.kubernetes.io/name: access-ai-agent
    app.kubernetes.io/component: ai-agent
spec:
  replicas: {{ .Values.accessAiAgent.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "shieldnet-access.selectorLabels" (dict "name" "access-ai-agent" "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shieldnet-access.labels" . | nindent 8 }}
        {{- include "shieldnet-access.selectorLabels" (dict "name" "access-ai-agent" "ctx" .) | nindent 8 }}
        app.kubernetes.io/component: ai-agent
    spec:
      serviceAccountName: access-ai-agent
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: access-ai-agent
          image: {{ include "shieldnet-access.image" (dict "service" "access-ai-agent" "tag" .Values.image.accessAiAgentTag "ctx" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: ACCESS_AI_AGENT_LISTEN_ADDR
              value: "0.0.0.0:8090"
            - name: ACCESS_AI_AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: access-ai-agent-secrets
                  key: api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: access-ai-agent-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: access-ai-agent-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            {{- toYaml .Values.accessAiAgent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
{{- end }}
