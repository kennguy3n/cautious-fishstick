# docker-compose.yml — local development stack for the ShieldNet
# Access platform. Brings up:
#
#   - Postgres (system of record)
#   - Redis (job queue + idempotency cache)
#   - ztna-api (HTTP API on :8080)
#   - access-connector-worker (queue consumer; no port)
#   - access-workflow-engine (HTTP webhooks on :8082)
#   - access-ai-agent (A2A skill server on :8090)
#   - pam-gateway (SSH proxy on :2222, health on :8081, plus the
#     PG/MySQL/K8s proxies on remapped host ports 15432 / 13306 /
#     18443 so they don't collide with the dev-stack Postgres)
#
# Env vars and ports follow docs/architecture.md §12 and
# docs/pam/architecture.md §9. Every service has a real healthcheck so
# `docker compose up --wait` only returns once the dependency graph is
# healthy.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: access
      POSTGRES_PASSWORD: access
      POSTGRES_DB: access
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U access -d access"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    networks: [access]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    networks: [access]

  ztna-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.ztna-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # ztna-api works without the agent (AssessRiskWithFallback /
      # DetectAnomaliesWithFallback degrade gracefully), but
      # POST /access/explain and /access/suggest 503 until the
      # agent is up. Waiting on service_healthy makes
      # `docker compose up --wait` return a working stack.
      access-ai-agent:
        condition: service_healthy
    environment:
      ZTNA_API_LISTEN_ADDR: ":8080"
      ACCESS_DATABASE_URL: postgres://access:access@postgres:5432/access?sslmode=disable
      ACCESS_REDIS_URL: redis://redis:6379/0
      # Wires ztna-api to the in-compose access-ai-agent so
      # /access/explain and /access/suggest work out of the box.
      # AssessRiskWithFallback / DetectAnomaliesWithFallback still
      # degrade gracefully if the agent is unreachable, so leaving
      # the API key empty keeps the dev-stack auth open per
      # docs/architecture.md §12 (rotate before any non-local use).
      ACCESS_AI_AGENT_BASE_URL: http://access-ai-agent:8090
      ACCESS_AI_AGENT_API_KEY: ""
    healthcheck:
      test: ["CMD", "/ztna-api", "--healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 12
    ports:
      - "8080:8080"
    networks: [access]

  access-connector-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.access-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ACCESS_DATABASE_URL: postgres://access:access@postgres:5432/access?sslmode=disable
      ACCESS_REDIS_URL: redis://redis:6379/0
    networks: [access]

  access-workflow-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.access-workflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ACCESS_WORKFLOW_ENGINE_LISTEN_ADDR: ":8082"
      ACCESS_DATABASE_URL: postgres://access:access@postgres:5432/access?sslmode=disable
      ACCESS_REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "/access-workflow", "--healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 12
    ports:
      - "8082:8082"
    networks: [access]

  pam-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.pam-gateway
    depends_on:
      ztna-api:
        condition: service_healthy
    environment:
      # ztna-api is reachable on the compose network at :8080. The
      # API key is intentionally blank for the dev stack — rotate
      # before any non-local use per docs/pam/architecture.md §12.
      PAM_GATEWAY_API_URL: http://ztna-api:8080
      PAM_GATEWAY_API_KEY: ""
      PAM_GATEWAY_SSH_PORT: "2222"
      PAM_GATEWAY_HEALTH_PORT: "8081"
      # The PG / MySQL / K8s proxies are off by default — each one
      # only binds when its port env var is set. The dev stack opts
      # all three in on the container's standard wire-protocol ports
      # (host-side they get remapped below so they don't collide
      # with the Postgres service). See cmd/pam-gateway/main.go.
      PAM_GATEWAY_PG_PORT: "5432"
      PAM_GATEWAY_MYSQL_PORT: "3306"
      PAM_GATEWAY_K8S_PORT: "8443"
      # Enable the local-disk replay store for the dev stack so SSH
      # sessions exercise the recorder path end-to-end. The directory
      # is backed by a tmpfs mount below — recordings are
      # session-scoped and intentionally do not persist across
      # `docker compose down`. Production deployments swap this for
      # the S3-backed store via PAM_S3_BUCKET / PAM_S3_REGION (see
      # cmd/pam-gateway/main.go and docs/pam/architecture.md §9).
      PAM_GATEWAY_REPLAY_DIR: /var/lib/pam-gateway/replays
    tmpfs:
      # tmpfs is the simplest way to give the distroless nonroot
      # runtime a writable directory without a docker volume. Bound
      # at 64 MiB which is plenty for dev-stack interactive sessions.
      - /var/lib/pam-gateway/replays:size=64m,mode=0700,uid=65532,gid=65532
    healthcheck:
      # /health is an unauthenticated liveness probe served by the
      # gateway's HTTP listener on PAM_GATEWAY_HEALTH_PORT.
      test:
        - CMD
        - /pam-gateway
        - --healthcheck
      interval: 10s
      timeout: 3s
      retries: 12
    ports:
      - "2222:2222"
      - "8081:8081"
      # The PG / MySQL / K8s proxies expose the standard wire-protocol
      # ports inside the container, but their host-side mappings are
      # bumped by 10_000 so they don't collide with the dev-stack
      # Postgres on :5432 (PR #96 review finding). Connect with
      # `psql -h localhost -p 15432`, `mysql -h 127.0.0.1 -P 13306`,
      # or `kubectl --server=https://localhost:18443` and pass the
      # PAM connect token from the lease approval UI.
      - "15432:5432"
      - "13306:3306"
      - "18443:8443"
    networks: [access]

  access-ai-agent:
    build:
      context: ./cmd/access-ai-agent
      dockerfile: Dockerfile
    environment:
      ACCESS_AI_AGENT_LISTEN_ADDR: "0.0.0.0:8090"
    # Compose-level healthcheck is declared explicitly (rather than
    # relying on the Dockerfile HEALTHCHECK) so the dependent
    # ztna-api can wait on `condition: service_healthy`. Probe hits
    # the stdlib /healthz handler defined in main.py.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=5).status == 200 else 1)
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 6
    ports:
      - "8090:8090"
    networks: [access]

volumes:
  postgres-data:

networks:
  access:
    driver: bridge
