openapi: 3.0.0
info:
  title: ShieldNet 360 Access Platform API
  description: |
    HTTP surface for the ZTNA access platform (PHASES.md §11 + ARCHITECTURE.md §2).
    Covers access requests, reviews, grants, policy drafting / simulation, AI
    explain / suggest, and inbound SCIM provisioning.

    This spec is regenerated by `scripts/generate-swagger.sh` whenever a
    handler-level change ships (cross-cutting criterion in docs/PHASES.md).
  version: 1.0.0
servers:
  - url: /
    description: Same-origin server. The access API is served by cmd/ztna-api.
paths:
  /health:
    get:
      summary: Liveness probe
      tags: [meta]
      responses:
        '200': { description: Service alive }
  /access/requests:
    post:
      summary: Create an access request
      tags: [access-requests]
      responses:
        '201': { description: Created }
        '400': { description: Validation error }
    get:
      summary: List access requests
      tags: [access-requests]
      parameters:
        - { name: workspace_id, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: Validation error }
  /access/requests/{id}:
    get:
      summary: Get an access request with its state-history audit trail
      tags: [access-requests]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Request + history }
        '404': { description: Not found }
  /access/requests/{id}/approve:
    post:
      summary: Approve an access request
      tags: [access-requests]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
        '409': { description: FSM rejection }
  /access/requests/{id}/deny:
    post:
      summary: Deny an access request
      tags: [access-requests]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
        '409': { description: FSM rejection }
  /access/requests/{id}/cancel:
    post:
      summary: Cancel an access request
      tags: [access-requests]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
        '409': { description: FSM rejection }
  /access/grants:
    get:
      summary: List active access grants
      tags: [access-grants]
      parameters:
        - { name: user_id, in: query, required: false, schema: { type: string } }
        - { name: connector_id, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: At least one filter required }
  /access/grants/{id}/entitlements:
    get:
      summary: List live app permissions for the user on the grant's connector
      tags: [access-grants]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Grant not found }
        '503': { description: App permission lookup not configured }
  /access/connectors:
    get:
      summary: List access connectors with last-sync timestamps and capability flags
      tags: [access-connectors]
      parameters:
        - { name: workspace_id, in: query, required: true, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: workspace_id required }
    post:
      summary: Connect a new access connector — validates, probes, encrypts, persists, and enqueues an initial sync_identities job
      tags: [access-connectors]
      responses:
        '201': { description: Created }
        '400': { description: Validation failed / unknown provider }
        '409': { description: Duplicate connector for (workspace, provider, connector_type) }
  /access/connectors/{id}:
    delete:
      summary: Soft-delete an access connector — revokes active grants and deregisters SSO
      tags: [access-connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Connector not found }
  /access/connectors/{id}/health:
    get:
      summary: Get the operational health view of an access connector
      tags: [access-connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Connector not found }
  /access/connectors/{id}/secret:
    put:
      summary: Rotate connector credentials — re-validates, re-encrypts, and atomically updates the secrets column
      tags: [access-connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: Validation failed }
        '404': { description: Connector not found }
  /access/connectors/{id}/sync:
    post:
      summary: Trigger an immediate sync_identities job for the supplied connector
      tags: [access-connectors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '202': { description: Job enqueued }
        '404': { description: Connector not found }
  /access/connectors/catalogue:
    get:
      summary: List the full process-global connector registry with per-workspace connection state
      description: |
        Returns one entry per registered provider with capability flags
        (sync_identities, sync_groups, sync_audit, scim_provision,
        sync_identities_delta) and, when the workspace already has a
        connection, the connector ID and status. Powers the Admin UI
        "available integrations" marketplace.
      tags: [access-connectors]
      parameters:
        - { name: workspace_id, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: workspace_id required }
  /access/reviews:
    post:
      summary: Start an access review campaign
      tags: [access-reviews]
      responses:
        '201': { description: Created }
  /access/reviews/{id}/decisions:
    post:
      summary: Submit a campaign decision
      tags: [access-reviews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /access/reviews/{id}/close:
    post:
      summary: Close an access review campaign
      tags: [access-reviews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /access/reviews/{id}/decisions/bulk:
    post:
      summary: Submit multiple campaign decisions in a single best-effort batch
      description: |
        Each entry in the decisions array is dispatched through the
        same SubmitDecision flow; failures on one entry do NOT short-
        circuit the remaining entries. Always returns 200 with a per-
        row results array and a summary roll-up (total / succeeded /
        failed). Envelope-level failures (missing decided_by, empty
        array, malformed JSON) return 4xx.
      tags: [access-reviews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK — per-row success/error in results array }
        '400': { description: Validation failed }
  /access/reviews/{id}/auto-revoke:
    post:
      summary: Auto-revoke unreviewed grants for a campaign
      tags: [access-reviews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /access/reviews/{id}/metrics:
    get:
      summary: Get campaign metrics
      tags: [access-reviews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /workspace/policy:
    post:
      summary: Create a draft policy
      tags: [policy]
      responses:
        '201': { description: Created }
  /workspace/policy/drafts:
    get:
      summary: List draft policies
      tags: [policy]
      responses:
        '200': { description: OK }
  /workspace/policy/{id}:
    get:
      summary: Get policy
      tags: [policy]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
  /workspace/policy/{id}/simulate:
    post:
      summary: Simulate a policy
      tags: [policy]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /workspace/policy/{id}/promote:
    post:
      summary: Promote a draft policy to active
      tags: [policy]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
  /workspace/policy/{id}/diff:
    get:
      summary: Diff a draft policy against the workspace's current live state
      description: |
        Returns a structured before/after report comparing the live
        baseline (union of OTHER live policies in the workspace) against
        the projection of the draft. Requires a previously-simulated
        draft; otherwise returns 409 Conflict.
      tags: [policy]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: workspace_id, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '400': { description: workspace_id required }
        '409': { description: Draft has not been simulated or is no longer a draft }
  /workspace/policy/test-access:
    post:
      summary: Test policy against a hypothetical access
      tags: [policy]
      responses:
        '200': { description: OK }
  /access/explain:
    post:
      summary: Explain an access decision via the AI agent
      tags: [ai]
      responses:
        '200': { description: OK }
        '503': { description: AI agent not configured }
  /access/suggest:
    post:
      summary: Suggest access remediation via the AI agent
      tags: [ai]
      responses:
        '200': { description: OK }
        '503': { description: AI agent not configured }
  /access/assistant:
    post:
      summary: Natural-language assistant — classifies a free-text query and dispatches to the matching AI skill
      description: |
        Routes a chat-style query to one of risk_assessment,
        access_anomaly_detection, connector_setup, or
        policy_recommendation (default). The request may supply an
        explicit 'skill' override to bypass classification. Returns
        the matched intent, the dispatched skill name, and the raw
        SkillResponse envelope.
      tags: [ai]
      responses:
        '200': { description: OK }
        '400': { description: query required }
        '502': { description: Upstream AI agent failure }
        '503': { description: AI agent not configured }
  /scim/Users:
    post:
      summary: Provision a SCIM user (joiner / mover)
      tags: [scim]
      responses:
        '201': { description: Created }
  /scim/Users/{id}:
    delete:
      summary: Deprovision a SCIM user (leaver)
      tags: [scim]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: No Content }
        '404': { description: Not found }
  /swagger:
    get:
      summary: Serve this OpenAPI 3.0 spec
      tags: [meta]
      responses:
        '200': { description: swagger.json }
